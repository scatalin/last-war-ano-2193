spring.application.name=last-war-ano-2193

# ─── H2 persistent database ─────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/appdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# H2 web console (useful in development – restrict or disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── File uploads ────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=500MB

# ─── Application paths ───────────────────────────────────────────────────────
app.upload.dir=./uploads
app.data.dir=./data

# ─── CSV persistence interval (milliseconds, default = 5 min) ────────────────
app.csv.persist.interval=300000

# ─── OCR ─────────────────────────────────────────────────────────────────────
# ocr.strategy: tesseract | vision-llm | mock
#   tesseract  — local Tesseract via tess4j (requires tesseract-ocr on host)
#   vision-llm — OpenAI-compatible vision endpoint (Ollama, GPT-4o, …)
#   mock       — hardcoded text, useful for local dev without any OCR engine
ocr.strategy=tesseract

# Tesseract — install: sudo apt-get install -y tesseract-ocr tesseract-ocr-eng
ocr.tessdata-path=/usr/share/tesseract-ocr/5/tessdata

# Vision LLM — used when ocr.strategy=vision-llm
# Env-var equivalents (for Docker / IntelliJ run config):
#   OCR_VISION_BASE_URL, OCR_VISION_MODEL, OCR_VISION_API_KEY, OCR_VISION_TIMEOUT_SECONDS
#
# Ollama (self-hosted):
#ocr.vision.base-url=http://localhost:11434
#ocr.vision.model=llava:13b
#ocr.vision.api-key=
#
# OpenAI:
#ocr.vision.base-url=https://api.openai.com
#ocr.vision.model=gpt-4o
#ocr.vision.api-key=sk-...
#
ocr.vision.base-url=http://localhost:11434
ocr.vision.model=llava:13b
ocr.vision.api-key=
ocr.vision.timeout-seconds=60

# ─── Logging ─────────────────────────────────────────────────────────────────
# DEBUG: method entry/exit, branching decisions, counts
# TRACE: actual parameter values and local variable contents at key moments
# Change to TRACE to get the full detail, or to INFO to quiet it down
logging.level.com.lastwar=DEBUG
