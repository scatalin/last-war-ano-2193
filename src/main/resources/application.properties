spring.application.name=last-war-ano-2193

# ─── H2 persistent database ─────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/appdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# H2 web console (useful in development – restrict or disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── File uploads ────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=500MB

# ─── Application paths ───────────────────────────────────────────────────────
app.upload.dir=./uploads
app.data.dir=./data

# ─── CSV persistence interval (milliseconds, default = 5 min) ────────────────
app.csv.persist.interval=300000

# ─── OCR ─────────────────────────────────────────────────────────────────────
# ocr.strategy: tesseract | vision-llm | openai | mock
#   tesseract  — local Tesseract via tess4j (requires tesseract-ocr on host)
#   vision-llm — self-hosted Ollama vision model
#   openai     — OpenAI ChatGPT vision API (gpt-4o)
#   mock       — hardcoded text, useful for local dev without any OCR engine
ocr.strategy=openai

# Tesseract — install: sudo apt-get install -y tesseract-ocr tesseract-ocr-eng
ocr.tessdata-path=/usr/share/tesseract-ocr/5/tessdata

# Vision LLM / Ollama — used when ocr.strategy=vision-llm
# Env-var equivalents: OCR_VISION_BASE_URL, OCR_VISION_MODEL, OCR_VISION_API_KEY
ocr.vision.base-url=http://localhost:11434
ocr.vision.model=llava:13b
ocr.vision.api-key=
ocr.vision.timeout-seconds=60

# OpenAI (ChatGPT) — used when ocr.strategy=openai
# NEVER put the real key here (this file is committed to git).
# Set it via environment variable instead:
#   export OCR_OPENAI_API_KEY=sk-...          (shell / .env file)
#   or IntelliJ: Run → Edit Configurations → Environment variables
#ocr.openai.base-url=https://api.openai.com  # default, no need to change
#ocr.openai.model=gpt-4o                     # default, no need to change
ocr.openai.api-key=${OCR_OPENAI_API_KEY:}

# ─── Google Sheets ───────────────────────────────────────────────────────────
# NEVER put real values here (this file is committed to git).
# Set via environment variables and restart the app:
#   export GOOGLE_SHEETS_ENABLED=true
#   export GOOGLE_SHEETS_CREDENTIALS_FILE=/path/to/service-account.json
#   export GOOGLE_SHEETS_SPREADSHEET_ID=1BxiMVs0XRA5...
#   export GOOGLE_SHEETS_SHEET_NAME=Rankings   # optional, default = Rankings
google.sheets.enabled=${GOOGLE_SHEETS_ENABLED:false}
google.sheets.credentials-file=${GOOGLE_SHEETS_CREDENTIALS_FILE:}
google.sheets.spreadsheet-id=${GOOGLE_SHEETS_SPREADSHEET_ID:}
google.sheets.sheet-name=${GOOGLE_SHEETS_SHEET_NAME:Rankings}

# ─── Logging ─────────────────────────────────────────────────────────────────
# DEBUG: method entry/exit, branching decisions, counts
# TRACE: actual parameter values and local variable contents at key moments
# Change to TRACE to get the full detail, or to INFO to quiet it down
logging.level.com.lastwar=DEBUG
