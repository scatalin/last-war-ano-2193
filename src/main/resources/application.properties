spring.application.name=last-war-ano-2193

# ─── H2 persistent database ─────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/appdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# H2 web console (useful in development – restrict or disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── File uploads ────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ─── Application paths ───────────────────────────────────────────────────────
app.upload.dir=./uploads
app.data.dir=./data

# ─── CSV persistence interval (milliseconds, default = 5 min) ────────────────
app.csv.persist.interval=300000

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.lastwar=DEBUG
