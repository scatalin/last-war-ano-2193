<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Data Management – Last War ANO 2193</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="bg-dark text-light">

<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container mt-4">
  <h2 class="mb-4">Data Management</h2>

  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <!-- Toolbar -->
  <div class="d-flex gap-2 mb-4">
    <form method="post" th:action="@{/admin/data/export}">
      <button type="submit" class="btn btn-success">⬇ Export to CSV</button>
    </form>
    <form method="post" th:action="@{/admin/data/export-sheets}">
      <button type="submit" class="btn btn-outline-success">⬆ Export to Google Sheets</button>
    </form>
  </div>

  <!-- Data table -->
  <div th:if="${entries.empty}" class="text-muted">No ranking entries in the database.</div>
  <div th:unless="${entries.empty}" class="table-responsive">
    <table class="table table-dark table-striped table-hover table-sm align-middle">
      <thead>
        <tr>
          <th>ID</th>
          <th>Rank</th>
          <th>Player</th>
          <th>Alliance</th>
          <th class="text-end">Power</th>
          <th class="text-end">Kills</th>
          <th>Category</th>
          <th>Submitted By</th>
          <th>Captured At</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="e : ${entries}">
          <td th:text="${e.id}" class="text-muted small"></td>
          <td th:text="${e.rank}">–</td>
          <td th:text="${e.playerName}">–</td>
          <td th:text="${e.allianceTag}">–</td>
          <td th:text="${e.power}" class="text-end font-monospace">–</td>
          <td th:text="${e.kills}" class="text-end font-monospace">–</td>
          <td><span class="badge bg-primary" th:text="${e.category}">–</span></td>
          <td th:text="${e.submittedBy}">–</td>
          <td th:text="${e.capturedAt}" class="small text-muted">–</td>
          <td>
            <form method="post"
                  th:action="@{/admin/data/delete/{id}(id=${e.id})}"
                  onsubmit="return confirm('Delete entry #' + /*[[${e.id}]]*/ '' + '?')">
              <button type="submit" class="btn btn-danger btn-sm">Delete</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
