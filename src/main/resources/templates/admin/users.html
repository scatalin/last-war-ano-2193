<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Management – Last War ANO 2193</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="bg-dark text-light">

<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container mt-4">
  <h2 class="mb-4">User Management</h2>

  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

  <!-- Create user form -->
  <div class="card bg-secondary mb-4">
    <div class="card-header">Create New User</div>
    <div class="card-body">
      <form method="post" th:action="@{/admin/users/create}" class="row g-2 align-items-end">
        <div class="col-md-3">
          <label class="form-label small">Username</label>
          <input name="username" type="text" class="form-control" required>
        </div>
        <div class="col-md-3">
          <label class="form-label small">Password</label>
          <input name="password" type="password" class="form-control" required>
        </div>
        <div class="col-md-3">
          <label class="form-label small">Role</label>
          <select name="role" class="form-select">
            <option value="VIEWER">Viewer (read-only)</option>
            <option value="SUBMITTER">Submitter (upload + view)</option>
            <option value="ADMIN">Admin (full access)</option>
          </select>
        </div>
        <div class="col-md-3">
          <button type="submit" class="btn btn-success w-100">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Users table -->
  <h4 class="mb-3">Existing Users</h4>
  <div class="table-responsive">
    <table class="table table-dark table-striped table-hover align-middle">
      <thead>
        <tr>
          <th>ID</th>
          <th>Username</th>
          <th>Roles</th>
          <th>Enabled</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="u : ${users}">
          <td th:text="${u.id}" class="text-muted small"></td>
          <td th:text="${u.username}" class="fw-semibold"></td>
          <td>
            <span th:each="r : ${u.roles}"
                  th:text="${r}"
                  class="badge bg-secondary me-1"></span>
          </td>
          <td>
            <span th:if="${u.enabled}"  class="badge bg-success">Yes</span>
            <span th:unless="${u.enabled}" class="badge bg-danger">No</span>
          </td>
          <td>
            <form method="post"
                  th:action="@{/admin/users/delete/{id}(id=${u.id})}"
                  onsubmit="return confirm('Delete user ' + /*[[${u.username}]]*/ '' + '?')">
              <button type="submit" class="btn btn-danger btn-sm">Delete</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
