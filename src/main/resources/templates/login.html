<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login – Last War ANO 2193</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="bg-dark text-light">
<div class="login-wrapper">
  <div class="login-card">
    <div class="card bg-secondary shadow">
      <div class="card-body p-4">
        <h3 class="card-title text-center mb-1">⚔️ Last War</h3>
        <p class="text-center text-muted mb-4 small">Alliance Manager – ANO 2193</p>

        <div th:if="${param.error}" class="alert alert-danger py-2">
          Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-info py-2">
          You have been logged out.
        </div>

        <form method="post" th:action="@{/login}">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input id="username" name="username" type="text"
                   class="form-control" autocomplete="username" required autofocus>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input id="password" name="password" type="password"
                   class="form-control" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
