<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard – Last War ANO 2193</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="bg-dark text-light">

<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container mt-4">
  <h2 class="mb-4">Dashboard</h2>

  <!-- Stats cards -->
  <div class="row g-3 mb-4">
    <div class="col-sm-6 col-md-3">
      <div class="card bg-secondary text-light h-100">
        <div class="card-body">
          <h6 class="card-subtitle mb-1 text-muted">Total Entries</h6>
          <p class="display-6 mb-0" th:text="${totalEntries}">0</p>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-md-3">
      <div class="card bg-secondary text-light h-100">
        <div class="card-body">
          <h6 class="card-subtitle mb-1 text-muted">Categories</h6>
          <p class="display-6 mb-0" th:text="${categories.size()}">0</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Category quick-links -->
  <div class="card bg-secondary mb-4">
    <div class="card-header">Available Categories</div>
    <div class="card-body">
      <p th:if="${categories.empty}" class="text-muted mb-0">
        No data yet – upload photos to populate rankings.
      </p>
      <div th:unless="${categories.empty}" class="d-flex flex-wrap gap-2">
        <a th:each="cat : ${categories}"
           th:href="@{/rankings(category=${cat})}"
           th:text="${cat}"
           class="btn btn-outline-light btn-sm"></a>
      </div>
    </div>
  </div>

  <!-- Quick actions -->
  <div class="d-flex gap-2">
    <a th:href="@{/rankings}" class="btn btn-outline-info">View All Rankings</a>
    <a sec:authorize="hasAnyRole('ADMIN','SUBMITTER')"
       th:href="@{/upload}" class="btn btn-primary">Upload Photo</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
