<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rankings – Last War ANO 2193</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="bg-dark text-light">

<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container mt-4">
  <h2 class="mb-4">Rankings</h2>

  <!-- Category filter -->
  <form method="get" th:action="@{/rankings}" class="row g-2 mb-4">
    <div class="col-auto">
      <select name="category" class="form-select form-select-sm">
        <option value="">All Categories</option>
        <option th:each="cat : ${categories}"
                th:value="${cat}"
                th:text="${cat}"
                th:selected="${cat == selectedCategory}"></option>
      </select>
    </div>
    <div class="col-auto">
      <button type="submit" class="btn btn-outline-light btn-sm">Filter</button>
    </div>
    <div class="col-auto" th:if="${selectedCategory != null}">
      <a th:href="@{/rankings}" class="btn btn-outline-secondary btn-sm">Clear</a>
    </div>
  </form>

  <div th:if="${entries.empty}" class="text-muted">
    No ranking entries found<span th:if="${selectedCategory != null}">
      for category "<span th:text="${selectedCategory}"></span>"</span>.
  </div>

  <div th:unless="${entries.empty}" class="table-responsive">
    <table class="table table-dark table-striped table-hover align-middle">
      <thead>
        <tr>
          <th>#</th>
          <th>Rank</th>
          <th>Player</th>
          <th>Alliance</th>
          <th class="text-end">Power</th>
          <th class="text-end">Kills</th>
          <th>Category</th>
          <th>Submitted By</th>
          <th>Captured At</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="e, stat : ${entries}">
          <td th:text="${stat.index + 1}" class="text-muted small"></td>
          <td th:text="${e.rank}">–</td>
          <td th:text="${e.playerName}">–</td>
          <td th:text="${e.allianceTag}">–</td>
          <td th:text="${e.power}" class="text-end font-monospace">–</td>
          <td th:text="${e.kills}" class="text-end font-monospace">–</td>
          <td><span class="badge bg-primary" th:text="${e.category}">–</span></td>
          <td th:text="${e.submittedBy}">–</td>
          <td th:text="${e.capturedAt}" class="small text-muted">–</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
