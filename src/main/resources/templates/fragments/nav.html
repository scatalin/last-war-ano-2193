<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
  <div class="container-fluid">
    <a class="navbar-brand" th:href="@{/dashboard}">⚔️ ANO 2193</a>
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#navbarContent"
            aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/rankings}">Rankings</a>
        </li>
        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','SUBMITTER')">
          <a class="nav-link" th:href="@{/upload}">Upload Photo</a>
        </li>
        <li class="nav-item dropdown" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Admin</a>
          <ul class="dropdown-menu dropdown-menu-dark">
            <li><a class="dropdown-item" th:href="@{/admin/users}">Users</a></li>
            <li><a class="dropdown-item" th:href="@{/admin/categories}">Categories</a></li>
            <li><a class="dropdown-item" th:href="@{/admin/data}">Data</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" th:href="@{/admin/sheets}">Google Sheets</a></li>
          </ul>
        </li>
      </ul>
      <ul class="navbar-nav align-items-center">
        <li class="nav-item me-2">
          <span class="navbar-text text-secondary small">
            <sec:authentication property="name" />
          </span>
        </li>
        <li class="nav-item">
          <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
          </form>
        </li>
      </ul>
    </div>
  </div>
</nav>
</body>
</html>
