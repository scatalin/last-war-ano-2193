<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Upload Photo – Last War ANO 2193</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="bg-dark text-light">

<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container mt-4">
  <h2 class="mb-4">Upload Ranking Photo</h2>

  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

  <div class="card bg-secondary mb-4">
    <div class="card-header">New Upload</div>
    <div class="card-body">
      <form method="post" th:action="@{/upload}" enctype="multipart/form-data">
        <div class="mb-3">
          <label for="file" class="form-label">Photo (PNG / JPG / WEBP)</label>
          <input id="file" name="file" type="file" class="form-control"
                 accept="image/*" required>
        </div>
        <div class="mb-3">
          <label for="category" class="form-label">Ranking Category</label>
          <input id="category" name="category" type="text" class="form-control"
                 placeholder="e.g. kills, power, construction" required>
          <div class="form-text text-muted">
            The category is used to group and filter entries in the Rankings view.
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Upload &amp; Process</button>
      </form>
    </div>
  </div>

  <!-- Upload history table -->
  <h4 class="mb-3">Upload History</h4>
  <div th:if="${uploads.empty}" class="text-muted">No uploads yet.</div>
  <div th:unless="${uploads.empty}" class="table-responsive">
    <table class="table table-dark table-striped table-hover align-middle">
      <thead>
        <tr>
          <th>Original Filename</th>
          <th>Category</th>
          <th>Uploaded By</th>
          <th>Date</th>
          <th>Status</th>
          <th>Notes</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="u : ${uploads}">
          <td th:text="${u.originalFilename}">–</td>
          <td th:text="${u.category}">–</td>
          <td th:text="${u.uploadedBy}">–</td>
          <td th:text="${u.uploadedAt}">–</td>
          <td>
            <span th:text="${u.status}"
                  th:classappend="${u.status == 'PROCESSED'} ? 'text-success' :
                                   (${u.status == 'FAILED'} ? 'text-danger' : 'text-warning')">
            </span>
          </td>
          <td th:text="${u.notes}">–</td>
          <td class="d-flex gap-2">
            <a th:if="${u.filename != null}"
               th:href="@{/upload/file/{id}(id=${u.id})}"
               class="btn btn-sm btn-outline-light">Download</a>
            <form th:if="${u.filename != null}"
                  th:action="@{/upload/reparse/{id}(id=${u.id})}"
                  method="post" style="display:inline">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <button type="submit" class="btn btn-sm btn-outline-warning">Re-parse</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
